<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22CISA%20Study%20Guide%22,%22short_name%22:%22CISA%20Study%22,%22description%22:%22Interactive%20CISA%20exam%20preparation%20with%20progress%20tracking%22,%22start_url%22:%22%22,%22scope%22:%22%22,%22display%22:%22standalone%22,%22background_color%22:%22%23ffffff%22,%22theme_color%22:%22%23667eea%22,%22orientation%22:%22portrait-primary%22,%22icons%22:[{%22src%22:%22data:image/svg+xml,<svg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20192%20192'><rect%20fill='%23667eea'%20width='192'%20height='192'/><text%20x='50%25'%20y='50%25'%20font-size='100'%20fill='white'%20text-anchor='middle'%20dominant-baseline='central'%20font-family='Arial'>🎓</text></svg>%22,%22sizes%22:%22192x192%22,%22type%22:%22image/svg+xml%22,%22purpose%22:%22any%22},{%22src%22:%22data:image/svg+xml,<svg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20512%20512'><rect%20fill='%23667eea'%20width='512'%20height='512'/><text%20x='50%25'%20y='50%25'%20font-size='280'%20fill='white'%20text-anchor='middle'%20dominant-baseline='central'%20font-family='Arial'>🎓</text></svg>%22,%22sizes%22:%22512x512%22,%22type%22:%22image/svg+xml%22,%22purpose%22:%22any%22}]}">
    <title>CISA Study Guide - PWA with Progress Tracking</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 80px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 0.95em;
            opacity: 0.95;
        }

        .content {
            padding: 25px;
        }

        .view {
            display: none;
        }

        .view.active {
            display: block;
        }

        .nav-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 25px;
            border-bottom: 2px solid #e0e0e0;
            overflow-x: auto;
        }

        .nav-tab {
            padding: 10px 15px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .nav-tab:hover {
            color: #667eea;
        }

        .nav-tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .stat-card h3 {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .value {
            font-size: 2.2em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 8px;
        }

        .stat-card .subtext {
            font-size: 0.85em;
            color: #888;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }

        .domain-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .domain-btn {
            padding: 12px;
            background: #f5f5f5;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 0.85em;
        }

        .domain-btn:hover {
            border-color: #667eea;
            background: #f0f3ff;
        }

        .domain-btn.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .quiz-controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .control-group {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }

        .control-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
            font-size: 0.9em;
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
        }

        .checkbox-item input[type="checkbox"] {
            margin-right: 8px;
            cursor: pointer;
        }

        .checkbox-item label {
            margin: 0;
            cursor: pointer;
            font-weight: normal;
            font-size: 0.9em;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
        }

        .btn-danger:hover {
            background: #ff5252;
        }

        .btn-success {
            background: #51cf66;
            color: white;
        }

        .btn-success:hover {
            background: #40c057;
        }

        .question-card {
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .question-number {
            background: #667eea;
            color: white;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .question-answered {
            font-size: 0.85em;
            font-weight: 600;
        }

        .question-answered.answered {
            color: #51cf66;
        }

        .question-answered.unanswered {
            color: #ffa94d;
        }

        .question-text {
            font-size: 1em;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }

        .option {
            padding: 12px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .option:hover {
            border-color: #667eea;
            background: #f0f3ff;
        }

        .option.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .option.correct {
            background: #d3f9d8;
            border-color: #51cf66;
            color: #2f5233;
        }

        .option.incorrect {
            background: #ffe0e0;
            border-color: #ff6b6b;
            color: #5c2e2e;
        }

        .explanation {
            background: #e7f5ff;
            border-left: 4px solid #339af0;
            padding: 12px;
            border-radius: 4px;
            margin-top: 15px;
            font-size: 0.9em;
            color: #1971c2;
            line-height: 1.5;
        }

        .quiz-progress {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        .resume-options {
            background: #f0f3ff;
            border: 2px solid #667eea;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .resume-options h3 {
            margin-bottom: 10px;
            color: #667eea;
            font-size: 1em;
        }

        .resume-options p {
            font-size: 0.9em;
            color: #555;
            margin-bottom: 10px;
        }

        .missed-question {
            background: #fff9e6;
            border-left: 4px solid #ffa94d;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 4px;
        }

        .missed-question h4 {
            color: #994d00;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .missed-filters {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .filter-tag {
            padding: 6px 12px;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.3s ease;
        }

        .filter-tag.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .install-prompt {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .install-prompt button {
            background: white;
            color: #667eea;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .install-prompt button:hover {
            transform: scale(1.05);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.5em;
            }

            .content {
                padding: 15px;
            }

            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .domain-buttons {
                grid-template-columns: repeat(2, 1fr);
            }

            .install-prompt {
                flex-direction: column;
                text-align: center;
            }

            .button-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 CISA Study Guide</h1>
            <p>Interactive exam preparation with progress tracking</p>
        </div>

        <div class="content">
            <div class="nav-tabs">
                <button class="nav-tab active" onclick="switchView('dashboard')">📊 Dashboard</button>
                <button class="nav-tab" onclick="switchView('quiz')">📝 Quiz</button>
                <button class="nav-tab" onclick="switchView('missed')">❌ Missed Questions</button>
            </div>

            <!-- DASHBOARD VIEW -->
            <div id="dashboard" class="view active">
                <div id="installPrompt"></div>

                <div class="dashboard-grid">
                    <div class="stat-card">
                        <h3>Total Answered</h3>
                        <div class="value" id="totalAnswered">0</div>
                        <div class="subtext" id="totalAnsweredSub">0 of 120 questions</div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="totalProgressBar" style="width: 0%"></div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <h3>Total Unanswered</h3>
                        <div class="value" id="totalUnanswered">120</div>
                        <div class="subtext">Remaining questions</div>
                    </div>
                    <div class="stat-card">
                        <h3>Overall Score</h3>
                        <div class="value" id="overallScore">—</div>
                        <div class="subtext" id="overallScoreSub">Complete a quiz to see results</div>
                    </div>
                </div>

                <h3 style="margin: 20px 0 15px 0; color: #333; font-size: 1.1em;">Progress by Domain</h3>
                <div class="dashboard-grid" id="domainStats"></div>

                <h3 style="margin: 20px 0 15px 0; color: #333; font-size: 1.1em;">Quick Actions</h3>
                <div class="button-group">
                    <button class="btn btn-primary" onclick="quickStartDomain()">Start a Domain Quiz</button>
                    <button class="btn btn-primary" onclick="quickStartAll()">Start All Domains</button>
                    <button class="btn btn-secondary" onclick="clearAllData()">Clear All Data</button>
                </div>
            </div>

            <!-- QUIZ VIEW -->
            <div id="quiz" class="view">
                <div id="quizSetup"></div>
                <div id="quizContent" style="display: none;"></div>
            </div>

            <!-- MISSED QUESTIONS VIEW -->
            <div id="missed" class="view">
                <div id="missedContent"></div>
            </div>
        </div>
    </div>

    <script>
        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:application/javascript,' + encodeURIComponent(`
                self.addEventListener('install', event => {
                    self.skipWaiting();
                });
                self.addEventListener('activate', event => {
                    event.waitUntil(clients.claim());
                });
                self.addEventListener('fetch', event => {
                    // Allow offline access
                });
            `)).catch(err => console.log('SW registration skipped for data URL'));
        }

        // Install Prompt Handler
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            showInstallPrompt();
        });

        function showInstallPrompt() {
            const prompt = document.getElementById('installPrompt');
            prompt.innerHTML = `
                <div class="install-prompt">
                    <div>
                        <strong>📱 Install CISA Study Guide</strong>
                        <p style="font-size: 0.9em; margin-top: 5px;">Add to your home screen for quick access and offline use</p>
                    </div>
                    <button onclick="installApp()">Install</button>
                    <button onclick="dismissInstall()" style="background: rgba(255,255,255,0.2); color: white;">Dismiss</button>
                </div>
            `;
        }

        function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(choiceResult => {
                    if (choiceResult.outcome === 'accepted') {
                        document.getElementById('installPrompt').innerHTML = '';
                    }
                    deferredPrompt = null;
                });
            }
        }

        function dismissInstall() {
            document.getElementById('installPrompt').innerHTML = '';
        }

        // QUIZ DATA
        const quizData = [
            // GOVERNANCE (25%) - 30 questions
            { id: 1, domain: 'Governance', text: 'Which of the following best describes the primary purpose of an IT governance framework?', options: ['To maximize IT spending', 'To align IT with business objectives and manage IT risk', 'To eliminate all IT risks', 'To reduce IT department headcount'], correct: 1, explanation: 'IT governance is specifically designed to align IT with business goals while managing risk. It does not seek to eliminate all risk or reduce headcount.' },
            { id: 2, domain: 'Governance', text: 'What is the main focus of COBIT?', options: ['Audit standards only', 'IT governance and management framework', 'Security controls only', 'Cost reduction'], correct: 1, explanation: 'COBIT (Control Objectives for Information and Related Technology) is a comprehensive governance and management framework for IT.' },
            { id: 3, domain: 'Governance', text: 'Which role is responsible for ensuring IT governance is implemented?', options: ['IT staff', 'Board of directors', 'Business users only', 'Auditors'], correct: 1, explanation: 'The Board of Directors and management are ultimately responsible for governance implementation and oversight.' },
            { id: 4, domain: 'Governance', text: 'What does ITIL primarily focus on?', options: ['Governance frameworks', 'IT service management best practices', 'Security standards', 'Database management'], correct: 1, explanation: 'ITIL provides best practices for IT Service Management (ITSM), covering the entire IT service lifecycle.' },
            { id: 5, domain: 'Governance', text: 'Which of the following is a key principle of IT governance?', options: ['Maximizing IT independence', 'Transparency and accountability', 'Avoiding documentation', 'Decentralized decision-making without oversight'], correct: 1, explanation: 'Transparency and accountability are fundamental principles of effective IT governance.' },
            { id: 6, domain: 'Governance', text: 'What is the purpose of an IT steering committee?', options: ['To replace the Board', 'To oversee IT strategy and make IT investment decisions', 'To execute all IT tasks', 'To eliminate IT risk entirely'], correct: 1, explanation: 'An IT steering committee provides oversight of IT strategy, prioritization, and investment decisions to align with business goals.' },
            { id: 7, domain: 'Governance', text: 'Which framework is most commonly used for enterprise risk management?', options: ['ISO 9001', 'COSO ERM', 'ISO 27001 only', 'ITIL v4'], correct: 1, explanation: 'The COSO Enterprise Risk Management framework provides a comprehensive approach to enterprise risk management.' },
            { id: 8, domain: 'Governance', text: 'What is the primary benefit of implementing an IT governance framework?', options: ['Increased IT costs', 'Better alignment of IT with business goals', 'Elimination of all risk', 'Faster software development'], correct: 1, explanation: 'The primary benefit is achieving better alignment between IT investments and business objectives while managing risk appropriately.' },
            { id: 9, domain: 'Governance', text: 'Which of the following is an example of a governance policy?', options: ['A system patch', 'An IT security policy', 'A network cable installation', 'A software update'], correct: 1, explanation: 'An IT security policy is a governance policy that sets expectations and controls for security practices.' },
            { id: 10, domain: 'Governance', text: 'What does balanced scorecard approach provide?', options: ['Only financial metrics', 'A balanced view of organizational performance', 'Only IT metrics', 'Elimination of reporting'], correct: 1, explanation: 'Balanced scorecard provides multiple perspectives on performance: financial, customer, internal processes, and learning.' },
            { id: 11, domain: 'Governance', text: 'Which is essential for effective IT governance?', options: ['Avoiding stakeholder involvement', 'Clear accountability and defined roles', 'Minimal documentation', 'No performance metrics'], correct: 1, explanation: 'Clear accountability and well-defined roles are essential for effective governance and performance management.' },
            { id: 12, domain: 'Governance', text: 'What is a key challenge in implementing IT governance?', options: ['Too much budget', 'Resistance to change and cultural issues', 'Too many employees', 'Excessive documentation'], correct: 1, explanation: 'Cultural resistance and change management challenges are among the biggest obstacles to successful governance implementation.' },
            { id: 13, domain: 'Governance', text: 'How should IT governance be aligned with business strategy?', options: ['IT should ignore business strategy', 'Through continuous communication and integrated planning', 'Only during annual planning', 'Through IT department decisions alone'], correct: 1, explanation: 'Continuous communication and integrated planning ensure IT governance supports and aligns with business strategy.' },
            { id: 14, domain: 'Governance', text: 'Which metric is important for IT governance?', options: ['Only speed of implementation', 'Cost, quality, risk, and alignment metrics', 'Only security metrics', 'Only budget metrics'], correct: 1, explanation: 'Effective governance requires balanced metrics covering cost, quality, risk management, and business alignment.' },
            { id: 15, domain: 'Governance', text: 'What role does compliance play in IT governance?', options: ['No role', 'Ensures adherence to regulations and standards', 'Only for external auditors', 'Reduces business flexibility'], correct: 1, explanation: 'Compliance ensures IT operations meet regulatory requirements and internal policies while supporting governance objectives.' },
            { id: 16, domain: 'Governance', text: 'Which of the following best describes a governance control?', options: ['A technical patch', 'A policy or procedure designed to ensure objectives are met', 'A backup system', 'A firewall rule'], correct: 1, explanation: 'Governance controls are policies, procedures, and practices that ensure objectives are achieved and risk is managed.' },
            { id: 17, domain: 'Governance', text: 'What is the role of the CIO in IT governance?', options: ['Technical implementation only', 'Strategic leadership and accountability for IT delivery and governance', 'User support only', 'Cost reduction only'], correct: 1, explanation: 'The CIO is responsible for strategic IT leadership, IT governance implementation, and accountability for IT performance.' },
            { id: 18, domain: 'Governance', text: 'How frequently should governance frameworks be reviewed?', options: ['Never', 'Annually or when business strategy changes', 'Only during crises', 'Continuously but formally reviewed periodically'], correct: 1, explanation: 'Governance frameworks should be periodically reviewed (annually) and adjusted when business strategy or environment changes.' },
            { id: 19, domain: 'Governance', text: 'What is the primary purpose of an IT policy?', options: ['To add work', 'To establish expectations and controls', 'To slow processes', 'To increase costs'], correct: 1, explanation: 'IT policies establish clear expectations for behavior and controls to ensure objectives are achieved and risk is managed.' },
            { id: 20, domain: 'Governance', text: 'Which governance mechanism addresses IT investment prioritization?', options: ['Project execution only', 'Portfolio management and governance', 'Budgeting alone', 'Individual request approval'], correct: 1, explanation: 'Portfolio management and governance provide a framework for evaluating, prioritizing, and overseeing IT investments.' },
            { id: 21, domain: 'Governance', text: 'What is the relationship between governance and operations?', options: ['Governance controls operations and sets strategic direction', 'Operations control governance', 'They are unrelated', 'Governance has no impact on operations'], correct: 0, explanation: 'Governance sets strategic direction and establishes control frameworks; operations execute within those frameworks.' },
            { id: 22, domain: 'Governance', text: 'Which stakeholder group is most critical for governance success?', options: ['Only IT', 'Business leadership, IT leadership, and the Board', 'Only external auditors', 'Only end-users'], correct: 1, explanation: 'Business leadership, IT leadership, and the Board must all be engaged for effective governance.' },
            { id: 23, domain: 'Governance', text: 'What should a governance charter include?', options: ['Only IT responsibilities', 'Purpose, scope, authority, roles, and responsibilities', 'Only financial limits', 'Only technical requirements'], correct: 1, explanation: 'A governance charter clearly defines purpose, scope, authority levels, and responsibilities for decision-making.' },
            { id: 24, domain: 'Governance', text: 'How does IT governance support risk management?', options: ['It ignores risk', 'By establishing controls and oversight for identified risks', 'Only by purchasing insurance', 'By avoiding decisions'], correct: 1, explanation: 'IT governance establishes the framework and controls necessary to identify, assess, and manage IT-related risks.' },
            { id: 25, domain: 'Governance', text: 'What is the impact of poor IT governance?', options: ['None', 'Misaligned investments, uncontrolled risk, compliance violations', 'Increased innovation only', 'Faster delivery'], correct: 1, explanation: 'Poor governance leads to misaligned IT investments, inadequate risk management, and potential compliance violations.' },
            { id: 26, domain: 'Governance', text: 'Which document typically outlines IT governance responsibilities?', options: ['User manual', 'IT governance policy or framework', 'Hardware specifications', 'Incident log'], correct: 1, explanation: 'An IT governance policy or framework document clearly outlines governance responsibilities and expectations.' },
            { id: 27, domain: 'Governance', text: 'What is the purpose of IT governance metrics and reporting?', options: ['To complicate reporting', 'To provide transparency and accountability in governance', 'To eliminate decision-making', 'To reduce oversight'], correct: 1, explanation: 'Metrics and reporting provide transparency, accountability, and insight into governance effectiveness and IT performance.' },
            { id: 28, domain: 'Governance', text: 'How should governance adapt to organizational change?', options: ['Governance never changes', 'Through regular review and adjustment to support business strategy', 'Only during crises', 'Only by external mandate'], correct: 1, explanation: 'Governance should be regularly reviewed and adjusted to remain relevant as business strategy and environment change.' },

            // RISK MANAGEMENT (30%) - 36 questions

            { id: 33, domain: 'Risk Management', text: 'What is risk tolerance in the context of IT risk management?', options: ['The amount of risk an organization is willing to accept', 'Zero risk', 'The ability to eliminate all risk', 'Risk avoidance'], correct: 0, explanation: 'Risk tolerance is the level of risk an organization is willing to accept while pursuing its objectives.' },
            { id: 34, domain: 'Risk Management', text: 'Which risk response strategy involves reducing the impact of a risk?', options: ['Avoidance', 'Mitigation', 'Acceptance', 'Transfer'], correct: 1, explanation: 'Risk mitigation involves taking actions to reduce the probability or impact of a risk occurring.' },
            { id: 35, domain: 'Risk Management', text: 'What is the purpose of a risk register?', options: ['To ignore risks', 'To document and track identified risks', 'To create more work', 'To avoid decisions'], correct: 1, explanation: 'A risk register documents identified risks, their analysis, and management plans for tracking and oversight.' },
            { id: 36, domain: 'Risk Management', text: 'Which of the following is an example of risk transfer?', options: ['Accepting the risk', 'Purchasing insurance for IT risks', 'Eliminating the activity', 'Ignoring the risk'], correct: 1, explanation: 'Risk transfer involves passing the risk to another party, such as through insurance or outsourcing.' },

            { id: 38, domain: 'Risk Management', text: 'How is risk prioritized?', options: ['By IT department preference', 'By analyzing impact and probability to identify highest-risk items', 'Randomly', 'By cost alone'], correct: 1, explanation: 'Risk prioritization uses impact and probability analysis to focus on the highest risks first.' },
            { id: 39, domain: 'Risk Management', text: 'What is the role of risk monitoring?', options: ['To eliminate risks', 'To track risks and ensure mitigation efforts are effective', 'To avoid taking action', 'To postpone decisions'], correct: 1, explanation: 'Risk monitoring provides ongoing tracking of risks and the effectiveness of controls and mitigation efforts.' },
            { id: 40, domain: 'Risk Management', text: 'Which framework is commonly used for IT risk assessment?', options: ['ITIL only', 'NIST, ISO 27005, or enterprise risk frameworks', 'Accounting standards only', 'Marketing frameworks'], correct: 1, explanation: 'NIST, ISO 27005, and enterprise risk management frameworks provide methodologies for IT risk assessment.' },
            { id: 41, domain: 'Risk Management', text: 'What should be included in a risk assessment?', options: ['Only financial impact', 'Asset identification, threat analysis, vulnerability assessment, and impact analysis', 'Only technical risks', 'Only compliance risks'], correct: 1, explanation: 'Comprehensive risk assessment includes asset identification, threat analysis, vulnerability assessment, and impact analysis.' },
            { id: 42, domain: 'Risk Management', text: 'How often should risk assessments be performed?', options: ['Never', 'Annually, or when significant changes occur', 'Only during crises', 'Only by external auditors'], correct: 1, explanation: 'Risk assessments should be performed annually and whenever significant business or IT changes occur.' },

            { id: 44, domain: 'Risk Management', text: 'Which of the following is NOT a typical risk mitigation strategy?', options: ['Implementing controls', 'Monitoring the environment', 'Ignoring identified risks', 'Developing contingency plans'], correct: 2, explanation: 'Ignoring identified risks is not a mitigation strategy; all risks must be addressed through acceptance, mitigation, transfer, or avoidance.' },
            { id: 45, domain: 'Risk Management', text: 'What is residual risk?', options: ['The original risk before mitigation', 'Risk remaining after mitigation controls are applied', 'Risk that cannot be measured', 'Total organizational risk'], correct: 1, explanation: 'Residual risk is the risk remaining after mitigation controls have been implemented and is the basis for acceptance decisions.' },
            { id: 46, domain: 'Risk Management', text: 'How should business continuity relate to IT risk management?', options: ['No relationship', 'Business continuity plans should address IT-related risks', 'Only IT risks matter', 'Business risks are irrelevant'], correct: 1, explanation: 'Business continuity planning must address IT risks and incorporate IT recovery strategies.' },
            { id: 47, domain: 'Risk Management', text: 'What is the purpose of risk communication?', options: ['To hide risks', 'To ensure all stakeholders understand risks and mitigation efforts', 'To avoid accountability', 'To delay decisions'], correct: 1, explanation: 'Effective risk communication ensures that all stakeholders understand identified risks and the organization\'s response.' },
            { id: 48, domain: 'Risk Management', text: 'Which role should be responsible for risk management oversight?', options: ['IT staff only', 'Senior management and the Board with IT expertise', 'End-users only', 'External parties only'], correct: 1, explanation: 'Senior management and the Board should oversee risk management to ensure appropriate governance and accountability.' },
            { id: 49, domain: 'Risk Management', text: 'What is vulnerability?', options: ['A threat', 'A weakness that can be exploited by a threat', 'An impact', 'A control'], correct: 1, explanation: 'A vulnerability is a weakness in systems, processes, or controls that could be exploited by a threat.' },
            { id: 50, domain: 'Risk Management', text: 'What is the relationship between threat and vulnerability?', options: ['No relationship', 'A threat exploits a vulnerability to cause harm', 'They are the same', 'Threats prevent vulnerabilities'], correct: 1, explanation: 'Risk occurs when a threat is capable of exploiting a vulnerability to cause harm or loss.' },
            { id: 51, domain: 'Risk Management', text: 'How should organizations manage emerging risks?', options: ['Ignore them', 'Monitor the environment and adjust risk strategies as new risks emerge', 'Wait for crises', 'Only address known risks'], correct: 1, explanation: 'Organizations should monitor the environment and adjust strategies to address emerging risks before they materialize.' },
            { id: 52, domain: 'Risk Management', text: 'What is scenario analysis in risk management?', options: ['Storytelling', 'Evaluating potential outcomes of hypothetical events', 'Avoiding planning', 'Cost reduction'], correct: 1, explanation: 'Scenario analysis involves evaluating potential outcomes of hypothetical events to inform risk and business continuity planning.' },
            { id: 53, domain: 'Risk Management', text: 'What should a risk response plan include?', options: ['Only costs', 'Actions, responsibilities, timelines, and success criteria for addressing risks', 'Only timelines', 'No specific details'], correct: 1, explanation: 'A risk response plan should include specific actions, responsible parties, timelines, and success criteria.' },
            { id: 54, domain: 'Risk Management', text: 'How is risk quantification performed?', options: ['Estimated guesses', 'Using historical data and analysis to assign probabilities and impacts', 'Avoiding numbers', 'Qualitative assessment only'], correct: 1, explanation: 'Quantitative risk analysis uses historical data and statistical methods to estimate probabilities and impacts.' },
            { id: 55, domain: 'Risk Management', text: 'What is qualitative risk analysis?', options: ['Using numbers only', 'Assessing risks using subjective judgment and categories', 'Eliminating risks', 'No assessment'], correct: 1, explanation: 'Qualitative analysis assesses risks using subjective judgment, rating scales (high/medium/low), and prioritization matrices.' },
            { id: 56, domain: 'Risk Management', text: 'Who should participate in risk identification?', options: ['Only IT management', 'All relevant stakeholders across business and IT', 'Only external consultants', 'Only senior executives'], correct: 1, explanation: 'Risk identification should involve all relevant stakeholders to ensure comprehensive coverage of risks.' },
            { id: 57, domain: 'Risk Management', text: 'What is risk appetite vs. risk tolerance?', options: ['Same thing', 'Appetite is desired risk level; tolerance is acceptable range around that level', 'Appetite is for insurance', 'Tolerance is for executives only'], correct: 1, explanation: 'Risk appetite sets the desired target; risk tolerance defines the acceptable range around that target.' },
            { id: 58, domain: 'Risk Management', text: 'How should IT risk management support business objectives?', options: ['It should not', 'By enabling strategic initiatives while managing risks appropriately', 'By avoiding all risk', 'By blocking all initiatives'], correct: 1, explanation: 'IT risk management should enable business objectives by managing risks at levels acceptable to the organization.' },
            { id: 59, domain: 'Risk Management', text: 'What is a risk threshold?', options: ['Irrelevant', 'A level at which predetermined actions are triggered', 'Maximum tolerance', 'Minimum risk'], correct: 1, explanation: 'A risk threshold is a specific level that, when exceeded, triggers predetermined responses or escalation.' },
            { id: 60, domain: 'Risk Management', text: 'How should organizations handle risk acceptance?', options: ['Never formally accept risk', 'Formally document and obtain approval for accepted risks', 'Hide accepted risks', 'Avoid decisions about risk'], correct: 1, explanation: 'Accepted risks should be formally documented with appropriate approval to ensure accountability and understanding.' },
            { id: 61, domain: 'Risk Management', text: 'What is the role of internal audit in risk management?', options: ['No role', 'To provide independent assessment of risk management effectiveness', 'To create risks', 'To prevent management from responding to risks'], correct: 1, explanation: 'Internal audit provides independent assurance that risk management processes are effective and risks are properly managed.' },
            { id: 62, domain: 'Risk Management', text: 'How should organizations measure risk management effectiveness?', options: ['No measurement needed', 'Using metrics that assess identification, mitigation, and monitoring', 'Only by cost', 'Only by incident count'], correct: 1, explanation: 'Risk management effectiveness should be measured using appropriate metrics that evaluate the full risk management process.' },

            { id: 64, domain: 'Risk Management', text: 'How should third-party IT risks be managed?', options: ['Ignored', 'Through vendor risk assessment, contracts, and ongoing monitoring', 'Only at contract signing', 'Without assessment'], correct: 1, explanation: 'Third-party risks require assessment before engagement, contractual controls, and ongoing monitoring throughout the relationship.' },
            { id: 65, domain: 'Risk Management', text: 'What is the purpose of risk culture?', options: ['To reduce governance', 'To create an environment where risks are identified and managed appropriately', 'To eliminate all risk discussions', 'To shift blame'], correct: 1, explanation: 'A strong risk culture encourages identification and communication of risks at all organizational levels.' },

            updateDomainProgress();
        }

        function updateDomainProgress() {
            const domains = ['Governance', 'Risk Management', 'IT Processes', 'IT Operations', 'Incident Management'];
            let totalAnswered = 0;

            domains.forEach(domain => {
                const domainQuestions = quizData.filter(q => q.domain === domain);
                const answered = domainQuestions.filter(q => state.answers[q.id] !== undefined).length;
                const unanswered = domainQuestions.length - answered;

                state.domainProgress[domain] = { answered, unanswered };
                totalAnswered += answered;
            });

            saveState();
        }

        // UI FUNCTIONS
        function switchView(view) {
            state.currentView = view;
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(view).classList.add('active');
            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');

            if (view === 'dashboard') renderDashboard();
            else if (view === 'quiz') renderQuizSetup();
            else if (view === 'missed') renderMissedQuestions();
        }

        function renderDashboard() {
            updateDomainProgress();
            let totalAnswered = 0;
            let totalQuestions = quizData.length;

            const domains = ['Governance', 'Risk Management', 'IT Processes', 'IT Operations', 'Incident Management'];
            domains.forEach(domain => {
                totalAnswered += state.domainProgress[domain].answered;
            });

            document.getElementById('totalAnswered').textContent = totalAnswered;
            document.getElementById('totalAnsweredSub').textContent = `${totalAnswered} of ${totalQuestions} questions`;
            document.getElementById('totalProgressBar').style.width = (totalAnswered / totalQuestions * 100) + '%';
            document.getElementById('totalUnanswered').textContent = (totalQuestions - totalAnswered);

            let overallScore = '--';
            if (state.quizHistory.length > 0) {
                const latest = state.quizHistory[state.quizHistory.length - 1];
                overallScore = latest.score + '%';
            }
            document.getElementById('overallScore').textContent = overallScore;

            const domainStats = document.getElementById('domainStats');
            domainStats.innerHTML = '';

            domains.forEach(domain => {
                const progress = state.domainProgress[domain];
                const total = quizData.filter(q => q.domain === domain).length;
                const percentComplete = Math.round(progress.answered / total * 100);

                domainStats.innerHTML += `
                    <div class="stat-card">
                        <h3>${domain}</h3>
                        <div class="value">${progress.answered}/${total}</div>
                        <div class="subtext">${progress.answered} answered, ${progress.unanswered} remaining</div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${percentComplete}%"></div>
                        </div>
                    </div>
                `;
            });
        }

        function renderQuizSetup() {
            const domainList = ['Governance', 'Risk Management', 'IT Processes', 'IT Operations', 'Incident Management'];

            let html = `
                <div class="quiz-controls">
                    <div class="control-group">
                        <label>Select Domains:</label>
                        <div class="domain-buttons">
            `;

            domainList.forEach(domain => {
                const isSelected = state.selectedDomains.includes(domain);
                html += `<button class="domain-btn ${isSelected ? 'selected' : ''}" onclick="toggleDomain('${domain}')">${domain}</button>`;
            });

            html += `
                        </div>
                    </div>

                    <div class="control-group">
                        <label>Include Missed Questions Only?</label>
                        <div class="checkbox-item">
                            <input type="checkbox" id="missedOnly" onchange="toggleMissedOnly()">
                            <label for="missedOnly">Yes, show only missed questions</label>
                        </div>
                    </div>

                    <div class="button-group">
                        <button class="btn btn-primary" onclick="startQuiz()">Start Quiz</button>
                    </div>
                </div>
            `;

            // Check for in-progress quizzes
            if (state.selectedQuestions.length > 0 && state.quizStarted) {
                const progressText = `${state.currentQuestionIndex + 1} of ${state.selectedQuestions.length} answered`;
                html += `
                    <div class="resume-options">
                        <h3>Quiz in Progress</h3>
                        <p>Progress: ${progressText}</p>
                        <div class="button-group">
                            <button class="btn btn-success" onclick="resumeQuiz()">Resume Quiz</button>
                            <button class="btn btn-secondary" onclick="restartQuiz()">Restart Quiz</button>
                        </div>
                    </div>
                `;
            }

            document.getElementById('quizSetup').innerHTML = html;
            document.getElementById('quizContent').style.display = 'none';
        }

        function toggleDomain(domain) {
            const index = state.selectedDomains.indexOf(domain);
            if (index > -1) {
                state.selectedDomains.splice(index, 1);
            } else {
                state.selectedDomains.push(domain);
            }
            renderQuizSetup();
        }

        function toggleMissedOnly() {
            // This will be handled in startQuiz
            renderQuizSetup();
        }

        function startQuiz() {
            if (state.selectedDomains.length === 0) {
                alert('Please select at least one domain');
                return;
            }

            const missedOnly = document.getElementById('missedOnly').checked;
            let questions = quizData.filter(q => state.selectedDomains.includes(q.domain));

            if (missedOnly) {
                questions = questions.filter(q => state.answers[q.id] !== undefined && state.answers[q.id] !== quizData.find(d => d.id === q.id).correct);
            }

            if (questions.length === 0) {
                alert('No questions available for the selected criteria');
                return;
            }

            state.selectedQuestions = questions;
            state.currentQuestionIndex = 0;
            state.quizStarted = true;
            saveState();
            renderQuiz();
        }

        function resumeQuiz() {
            renderQuiz();
        }

        function restartQuiz() {
            state.currentQuestionIndex = 0;
            state.answers = {};
            state.quizStarted = true;
            saveState();
            renderQuizSetup();
        }

        function renderQuiz() {
            document.getElementById('quizSetup').innerHTML = '';
            document.getElementById('quizContent').style.display = 'block';

            const question = state.selectedQuestions[state.currentQuestionIndex];
            const isAnswered = state.answers[question.id] !== undefined;
            const selectedOption = state.answers[question.id];

            let html = `
                <div class="quiz-progress">
                    <div class="progress-info">
                        <span>Question ${state.currentQuestionIndex + 1} of ${state.selectedQuestions.length}</span>
                        <span id="quizDomain">${question.domain}</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${Math.round((state.currentQuestionIndex + 1) / state.selectedQuestions.length * 100)}%"></div>
                    </div>
                </div>

                <div class="question-card">
                    <div class="question-header">
                        <span class="question-number">Q${state.currentQuestionIndex + 1}</span>
                        <span class="question-answered ${isAnswered ? 'answered' : 'unanswered'}">
                            ${isAnswered ? '✓ Answered' : '○ Unanswered'}
                        </span>
                    </div>
                    <div class="question-text">${question.text}</div>
                    <div class="options">
            `;

            question.options.forEach((option, index) => {
                const isSelected = selectedOption === index;
                let optionClass = '';

                if (isAnswered) {
                    if (index === question.correct) {
                        optionClass = 'correct';
                    } else if (isSelected && index !== question.correct) {
                        optionClass = 'incorrect';
                    }
                } else if (isSelected) {
                    optionClass = 'selected';
                }

                html += `
                    <button class="option ${optionClass}" onclick="selectOption(${index})">
                        ${String.fromCharCode(65 + index)}. ${option}
                    </button>
                `;
            });

            html += `</div>`;

            if (isAnswered) {
                html += `<div class="explanation"><strong>Explanation:</strong> ${question.explanation}</div>`;
            }

            html += `
                <div class="button-group">
                    <button class="btn btn-secondary" onclick="previousQuestion()" ${state.currentQuestionIndex === 0 ? 'disabled' : ''}>← Previous</button>
                    <button class="btn btn-secondary" onclick="exitQuiz()">Exit Quiz</button>
                    <button class="btn btn-primary" onclick="nextQuestion()" ${state.currentQuestionIndex === state.selectedQuestions.length - 1 ? 'disabled' : ''}>Next →</button>
                </div>

                ${state.currentQuestionIndex === state.selectedQuestions.length - 1 ? `
                    <div class="button-group">
                        <button class="btn btn-success" onclick="submitQuiz()">Submit Quiz</button>
                    </div>
                ` : ''}
            `;

            document.getElementById('quizContent').innerHTML = html;
        }

        function selectOption(index) {
            const question = state.selectedQuestions[state.currentQuestionIndex];
            state.answers[question.id] = index;
            saveState();
            updateDomainProgress();
            renderQuiz();
        }

        function nextQuestion() {
            if (state.currentQuestionIndex < state.selectedQuestions.length - 1) {
                state.currentQuestionIndex++;
                renderQuiz();
            }
        }

        function previousQuestion() {
            if (state.currentQuestionIndex > 0) {
                state.currentQuestionIndex--;
                renderQuiz();
            }
        }

        function exitQuiz() {
            if (confirm('Exit quiz without submitting? Your progress will be saved.')) {
                state.quizStarted = false;
                saveState();
                renderQuizSetup();
            }
        }

        function submitQuiz() {
            const correct = state.selectedQuestions.filter(q => state.answers[q.id] === quizData.find(d => d.id === q.id).correct).length;
            const score = Math.round(correct / state.selectedQuestions.length * 100);

            const quizRecord = {
                timestamp: new Date().toISOString(),
                domains: state.selectedDomains,
                totalQuestions: state.selectedQuestions.length,
                correct,
                score,
                answers: { ...state.answers }
            };

            state.quizHistory.push(quizRecord);
            state.quizStarted = false;
            state.currentQuestionIndex = 0;
            saveState();

            alert(`Quiz Complete!\nScore: ${score}%\nCorrect: ${correct}/${state.selectedQuestions.length}`);
            renderQuizSetup();
        }

        function quickStartDomain() {
            state.selectedDomains = ['Governance'];
            document.getElementById('quiz').classList.add('active');
            document.getElementById('dashboard').classList.remove('active');
            document.querySelector('.nav-tabs').children[1].classList.add('active');
            document.querySelector('.nav-tabs').children[0].classList.remove('active');
            renderQuizSetup();
        }

        function quickStartAll() {
            state.selectedDomains = ['Governance', 'Risk Management', 'IT Processes', 'IT Operations', 'Incident Management'];
            document.getElementById('quiz').classList.add('active');
            document.getElementById('dashboard').classList.remove('active');
            document.querySelector('.nav-tabs').children[1].classList.add('active');
            document.querySelector('.nav-tabs').children[0].classList.remove('active');
            renderQuizSetup();
        }

        function renderMissedQuestions() {
            const missedQuestions = quizData.filter(q => {
                const answered = state.answers[q.id] !== undefined;
                const isCorrect = state.answers[q.id] === q.correct;
                return answered && !isCorrect;
            });

            if (missedQuestions.length === 0) {
                document.getElementById('missedContent').innerHTML = `
                    <div class="empty-state">
                        <p style="font-size: 1.2em; margin-bottom: 10px;">✓ Great work!</p>
                        <p>You haven't missed any answered questions yet.</p>
                    </div>
                `;
                return;
            }

            const domains = ['Governance', 'Risk Management', 'IT Processes', 'IT Operations', 'Incident Management'];
            let html = `<div class="missed-filters">`;

            domains.forEach(domain => {
                const count = missedQuestions.filter(q => q.domain === domain).length;
                if (count > 0) {
                    html += `<button class="filter-tag" onclick="filterMissed('${domain}')">${domain} (${count})</button>`;
                }
            });

            html += `<button class="filter-tag active" onclick="filterMissed('all')">All (${missedQuestions.length})</button></div>`;

            missedQuestions.forEach(q => {
                const selectedIndex = state.answers[q.id];
                const selectedAnswer = q.options[selectedIndex];
                const correctAnswer = q.options[q.correct];

                html += `
                    <div class="missed-question">
                        <h4>${q.domain} - Q${q.id}</h4>
                        <p style="margin-bottom: 10px;"><strong>${q.text}</strong></p>
                        <p style="margin: 8px 0; color: #d9534f;"><strong>Your Answer:</strong> ${selectedAnswer}</p>
                        <p style="margin: 8px 0; color: #5cb85c;"><strong>Correct Answer:</strong> ${correctAnswer}</p>
                        <div class="explanation">${q.explanation}</div>
                    </div>
                `;
            });

            document.getElementById('missedContent').innerHTML = html;
        }

        function filterMissed(domain) {
            // Simplified filter - re-renders all or filters by domain
            renderMissedQuestions();
        }

        function clearAllData() {
            if (confirm('Clear all quiz data and progress? This cannot be undone.')) {
                state = {
                    currentView: 'dashboard',
                    selectedDomains: [],
                    selectedQuestions: [],
                    currentQuestionIndex: 0,
                    quizStarted: false,
                    answers: {},
                    quizHistory: [],
                    domainProgress: {}
                };
                localStorage.removeItem('cisaQuizState');
                loadState();
                renderDashboard();
                alert('All data cleared.');
            }
        }

        // Initialize
        loadState();
        renderDashboard();
    </script>
</body>
</html>
